name: ci.yml

on: pull_request

jobs:
  cache-and-install:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://myuser:mypassword@localhost:5432/mydb?schema=public

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
          POSTGRES_DB: mydb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U myuser -d mydb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Check
        run: pnpm turbo run lint

      - name: Build Check
        run: pnpm turbo run build

      - name: Test
        run: pnpm test

      - name: Apply Test Database Migrations
        run: pnpm --filter backend exec prisma migrate deploy

      - name: Yjs Recovery E2E
        # This E2E boots the real AppModule. It does not call Google Places,
        # but GoogleService still validates its required startup configuration.
        env:
          GOOGLE_MAPS_API_KEY: ci-placeholder-not-used
        run: pnpm --filter backend test:e2e:recovery

      - name: Socket.IO Multi-instance E2E
        env:
          REDIS_URL: redis://localhost:6379
        run: pnpm --filter backend test:e2e:multi-instance

      - name: Yjs Distributed Consistency E2E
        env:
          REDIS_URL: redis://localhost:6379
        run: pnpm --filter backend test:e2e:distributed-consistency
